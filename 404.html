<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | M.A.T.G.A.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2744 50%, #0d1f3c 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 160px 30px, #fff, transparent);
            background-size: 200px 100px;
            opacity: 0.3;
            z-index: 0;
        }

        .content { position: relative; z-index: 1; max-width: 600px; }

        .flag { font-size: 1.2rem; letter-spacing: 0.3em; margin-bottom: 1rem; }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 6rem;
            color: #c41e3a;
            line-height: 1;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 20px rgba(196, 30, 58, 0.3);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #d4af37;
            margin-bottom: 1.5rem;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: rgba(255,255,255,0.7);
            margin-bottom: 2rem;
        }

        .home-btn {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(135deg, #c41e3a, #8b1428);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 6px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(196, 30, 58, 0.3);
        }

        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(196, 30, 58, 0.4);
        }

        .brand {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.15em;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="content">
        <div class="flag">🇺🇸 ★ ★ ★</div>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>
            Like American yarn spinning capacity, this page seems to have gone missing.
            But unlike our textile industry — we can bring you right back home.
        </p>
        <a href="/" class="home-btn">← Return to MATGA Home</a>
        <div class="brand">M.A.T.G.A. — MAKE AMERICA TEXTILE GREAT AGAIN</div>
    </div>
</body>
</html>
